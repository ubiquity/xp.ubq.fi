name: Deno Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@main
    with:
      project: xp-ubq-fi
      entrypoint: deno/artifact-proxy.ts
      bun_version: 1.3.4
      install_command: bun install
      build_command: bun run tools/build.ts
      include: |
        deno/deno.json
        dist/**
        src/**
        tests/fixtures/artifacts/**
      exclude: |
        .git
        .github
        node_modules
        build
        coverage
        .turbo
        .next
        .vercel
      debug_fetch_fail: true
    secrets: inherit
