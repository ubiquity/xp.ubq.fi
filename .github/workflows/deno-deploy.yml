name: Deno Deploy

on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@main
    with:
      project: xp-ubq-fi
      preview_project: xp-ubq-fi-preview
      entrypoint: deno/artifact-proxy.ts
      bun_version: 1.2.x
      install_command: bun install
      build_command: bun run tools/build.ts
      include: |
        deno/deno.json
        dist/**
        src/**
        tests/fixtures/artifacts/**
      exclude: |
        .git
        .github
        node_modules
        build
        coverage
        .turbo
        .next
        .vercel
      index_html_path: static/index.html
      debug_fetch_fail: true
    secrets:
      DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
