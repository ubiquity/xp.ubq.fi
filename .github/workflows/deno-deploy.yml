name: Deno Deploy

on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@codex/deno-2-programmatic
    with:
      project: xp-ubq-fi
      deploy_platform: deno2
      entrypoint: deno/artifact-proxy.ts
      install_command: deno install
      build_command: deno task build
      include: |
        deno/**
        dist/**
        src/**
        tests/fixtures/artifacts/**
      debug_fetch_paths: |
        /
        /bundle.js
        /artifact-processor.js
        /css/style.css
      debug_fetch_fail: true
    secrets: inherit
